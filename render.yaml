services:
  - type: web
    name: data-enrichment-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false   # set manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false   # set manually in Render dashboard
    healthCheckPath: /
