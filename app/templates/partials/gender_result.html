{% if error %}
<div class="bg-red-50 border border-red-200 text-red-700 rounded px-4 py-3 text-sm">
  {{ error }}
</div>
{% else %}
<div class="space-y-4">
  <p class="text-sm text-gray-600">
    Classified <strong>{{ row_count }}</strong> rows. Preview (first 20):
  </p>

  <div class="overflow-x-auto rounded border border-gray-200">
    <table class="min-w-full text-xs text-left">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          {% for col in columns %}
          <th class="px-3 py-2 font-medium text-gray-600 whitespace-nowrap">{{ col }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        {% for row in preview %}
        <tr class="hover:bg-gray-50">
          {% for col in columns %}
          <td class="px-3 py-2 text-gray-700 whitespace-nowrap">{{ row[col] }}</td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <a
    href="/api/gender/download/{{ token }}"
    class="inline-block bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded
           hover:bg-indigo-700 transition-colors"
  >
    Download {{ filename }}
  </a>
</div>
{% endif %}
