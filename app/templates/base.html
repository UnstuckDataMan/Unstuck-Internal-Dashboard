<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Data Enrichment Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/output.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body class="h-full flex">

  <!-- Sidebar -->
  <aside class="w-56 bg-gray-900 text-white flex flex-col shrink-0">
    <div class="px-4 py-5 border-b border-gray-700">
      <span class="text-sm font-semibold tracking-wide uppercase text-gray-300">Data Enrichment</span>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/"
         class="block px-3 py-2 rounded text-sm transition-colors
                {% if active == 'home' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
        Dashboard
      </a>
      <a href="/gender"
         class="block px-3 py-2 rounded text-sm transition-colors
                {% if active == 'gender' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
        Gender Classifier
      </a>
      <a href="/city-state"
         class="block px-3 py-2 rounded text-sm transition-colors
                {% if active == 'city' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
        City / State
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white border-b border-gray-200 px-6 py-4">
      <h1 class="text-lg font-semibold text-gray-800">{% block heading %}{% endblock %}</h1>
    </header>
    <main class="flex-1 overflow-y-auto p-6">
      {% block content %}{% endblock %}
    </main>
  </div>

</body>
</html>
