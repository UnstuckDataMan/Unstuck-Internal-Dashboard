<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Data Enrichment{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:   #7c3aed;
      --indigo:   #5b5ea6;
      --pink:     #e879f9;
      --gradient: linear-gradient(135deg, #180835 0%, #7c3aed 32%, #5b5ea6 62%, #e879f9 100%);
      --text:     #1d1d1f;
      --text-2:   #6e6e73;
      --surface:  #ffffff;
      --bg:       #f5f5f7;
      --border:   #e8e8ed;
      --red:      #ff3b30;
      --red-bg:   #fff2f2;
      --red-bdr:  #ffd0ce;
      --sh-sm:  0 1px 4px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.04);
      --sh-md:  0 4px 20px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
      --ease:   cubic-bezier(.25,.1,.25,1);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
              "Helvetica Neue", Arial, sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      /* Fade in from loader white */
      animation: pageIn 0.55s cubic-bezier(0,0,.2,1) 0.05s both;
    }

    @keyframes pageIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Topbar ──────────────────────────────────────────────── */
    .topbar {
      background: rgba(255,255,255,.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
      height: 54px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 0;
    }

    .home-link {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      flex-shrink: 0;
      min-width: 130px;
    }

    .home-mark {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.22s var(--ease), box-shadow 0.22s var(--ease);
      box-shadow: 0 2px 8px rgba(124,58,237,.28);
    }
    .home-link:hover .home-mark {
      transform: scale(1.08);
      box-shadow: 0 4px 14px rgba(124,58,237,.38);
    }

    .home-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      transition: color 0.18s var(--ease);
      letter-spacing: -.01em;
    }
    .home-link:hover .home-label { color: var(--text); }

    .topbar-title {
      flex: 1;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.015em;
      /* Offset so it's visually centered (accounts for home-link width) */
      margin-right: 130px;
    }

    /* ── Page content ────────────────────────────────────────── */
    .page {
      flex: 1;
      overflow-y: auto;
      padding: 36px 36px 60px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      animation: slideUp 0.5s cubic-bezier(0,0,.2,1) 0.1s both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .page-sub {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 26px;
    }

    /* ── Form card ───────────────────────────────────────────── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: var(--sh-sm);
    }

    /* ── Form elements ───────────────────────────────────────── */
    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 7px;
    }
    label .opt { font-weight: 400; color: var(--text-2); }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
      -webkit-appearance: none;
    }
    input[type="text"]:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,.12);
    }
    input[type="text"]::placeholder { color: #b8b8c0; }

    input[type="file"] {
      width: 100%;
      font-size: 13px;
      font-family: var(--font);
      color: var(--text-2);
      border: 1.5px dashed var(--border);
      border-radius: 9px;
      padding: 13px 14px;
      background: #fafafa;
      cursor: pointer;
      outline: none;
      transition: border-color .2s var(--ease), background .2s var(--ease);
    }
    input[type="file"]:hover {
      border-color: var(--purple);
      background: rgba(124,58,237,.02);
    }
    input[type="file"]::file-selector-button {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      color: var(--purple);
      background: rgba(124,58,237,.09);
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      margin-right: 10px;
      cursor: pointer;
      transition: background .15s var(--ease);
    }
    input[type="file"]::file-selector-button:hover {
      background: rgba(124,58,237,.16);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    .form-hint {
      font-size: 12px;
      color: var(--text-2);
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 14px;
      line-height: 1.55;
      margin-bottom: 18px;
    }

    /* ── Actions ─────────────────────────────────────────────── */
    .form-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      outline: none;
      transition: all .2s var(--ease);
      text-decoration: none;
      letter-spacing: -.01em;
    }

    .btn-primary {
      background: var(--gradient);
      color: white;
      padding: 10px 22px;
      box-shadow: 0 2px 10px rgba(124,58,237,.28);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(124,58,237,.38);
    }
    .btn-primary:active { transform: none; box-shadow: 0 2px 6px rgba(124,58,237,.2); }

    .btn-download {
      background: var(--surface);
      color: var(--purple);
      border: 1.5px solid rgba(124,58,237,.35);
      padding: 9px 18px;
    }
    .btn-download:hover {
      background: var(--purple);
      color: white;
      border-color: var(--purple);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(124,58,237,.28);
    }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-2);
    }
    .htmx-request .spinner,
    .htmx-request.spinner { display: inline-flex; }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--purple);
      animation: dotPulse 1.1s infinite var(--ease);
    }
    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }
    @keyframes dotPulse {
      0%,100% { opacity:.25; transform:scale(.7); }
      50%      { opacity:1;   transform:scale(1);  }
    }

    /* ── Result area ─────────────────────────────────────────── */
    .result-wrap {
      animation: resultIn 0.4s cubic-bezier(0,0,.2,1) both;
    }
    @keyframes resultIn {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0);    }
    }

    .result-meta {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 14px;
    }
    .result-meta strong { color: var(--text); font-weight: 600; }

    /* ── Table ───────────────────────────────────────────────── */
    .tbl-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: auto;
      margin-bottom: 18px;
      box-shadow: var(--sh-sm);
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead {
      background: #f9f9fb;
      position: sticky; top: 0;
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-2);
      text-align: left;
      white-space: nowrap;
    }
    td {
      padding: 9px 14px;
      color: var(--text);
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background .12s var(--ease); }
    tbody tr:hover { background: rgba(124,58,237,.03); }

    /* ── Error ───────────────────────────────────────────────── */
    .err-box {
      background: var(--red-bg);
      border: 1px solid var(--red-bdr);
      border-radius: 9px;
      padding: 13px 16px;
      font-size: 14px;
      color: var(--red);
      animation: resultIn .2s var(--ease) both;
    }

    /* ── HTMX indicator base ─────────────────────────────────── */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { display: inline-flex; }

    /* ── Page transition overlay ── */
    #pt { position:fixed; inset:0; z-index:9999; pointer-events:none; }
    .pt-b, .pt-f {
      position:absolute; inset:0;
      transform:translateY(-100%);
      border-radius:0;
      will-change:transform,border-radius;
    }
    .pt-b { background:linear-gradient(135deg,#2d1b69 0%,#9d4edd 30%,#7b7ec8 60%,#f0a0ff 100%); }
    .pt-f { background:linear-gradient(135deg,#180835 0%,#7c3aed 32%,#5b5ea6 62%,#e879f9 100%); }
    body.pt-enter,
    body.pt-enter .page { animation:none !important; opacity:1 !important; }
  </style>
</head>
<body>

<!-- Page transition overlay -->
<div id="pt" aria-hidden="true">
  <div class="pt-b"></div>
  <div class="pt-f"></div>
</div>

  <header class="topbar">
    <a href="/" class="home-link">
      <div class="home-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <span class="home-label">Home</span>
    </a>
    <h1 class="topbar-title">{% block heading %}{% endblock %}</h1>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

<script>
(function() {
  const pt = document.getElementById('pt');

  function ptLeave(href) {
    pt.style.pointerEvents = 'all';
    gsap.set('.pt-b, .pt-f', { yPercent: -100, borderRadius: '0 0 22px 22px' });
    gsap.timeline({ onComplete: () => {
      sessionStorage.setItem('pt', '1');
      window.location.href = href;
    }})
      .to('.pt-b', { yPercent: 0, borderRadius: 0, duration: 0.62, ease: 'power3.inOut' })
      .to('.pt-f', { yPercent: 0, borderRadius: 0, duration: 0.62, ease: 'power3.inOut' }, '-=0.42');
  }

  // Intercept Home button
  document.querySelector('.home-link')?.addEventListener('click', function(e) {
    e.preventDefault();
    ptLeave(this.getAttribute('href'));
  });

  // Enter animation
  if (sessionStorage.getItem('pt')) {
    sessionStorage.removeItem('pt');
    document.body.classList.add('pt-enter');
    pt.style.pointerEvents = 'all';
    gsap.set('.pt-b, .pt-f', { yPercent: 0, borderRadius: 0 });
    gsap.timeline({ onComplete: () => { pt.style.pointerEvents = 'none'; } })
      .to('.pt-f', { yPercent: -100, borderRadius: '0 0 22px 22px', duration: 0.62, ease: 'power3.inOut' })
      .to('.pt-b', { yPercent: -100, borderRadius: '0 0 22px 22px', duration: 0.62, ease: 'power3.inOut' }, '-=0.42');
  }
})();
</script>

</body>
</html>
